<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>上海财经大学基层就业地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; font-family: 'SimHei', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .main-header { width: 100%; padding: 25px 0; text-align: center; flex-shrink: 0; }
        .main-header h1 { color: #000; font-size: 2.5rem; font-weight: bold; }
        .map-container { flex-grow: 1; position: relative; width: 100%; }
        #china-map { width: 100%; height: 100%; }
        .logo-bar { position: absolute; top: 10px; left: 30px; z-index: 10; }
        .logo-bar img { height: 70px; width: auto; }
        .info-card { position: absolute; bottom: 40px; left: 40px; z-index: 10; background: #fff; border: 1.5px solid #000; padding: 20px; min-width: 260px; box-shadow: 4px 4px 0 rgba(0,0,0,0.1); }
        .region-name { font-size: 1.8rem; font-weight: bold; color: #d6292b; margin-bottom: 10px; }
        #loadingOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 20; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>

<div class="main-header">
    <h1>上海财经大学基层就业导向图</h1>
</div>

<div class="map-container">
    <div id="china-map"></div>
    <div class="logo-bar">
        <img src="SufeLogo.png" alt="Logo" onerror="this.style.opacity='0'">
    </div>
    <div class="info-card">
        <div style="font-size:0.9rem; color:#666;">区域详情</div>
        <div class="region-name" id="selectedRegion">请点击省份</div>
        <div id="regionData" style="font-size:1rem; line-height:1.5;"></div>
    </div>
    <div id="loadingOverlay">
        <div id="statusText">正在加载地图数据...</div>
    </div>
</div>

<script>
    (function() {
        const dataList = [
            { name: '上海', policy: '“三支一扶”专项补贴', info: '重点支持基层公共服务岗位。' },
            { name: '新疆', policy: '西部计划重点支持', info: '提供全方位待遇保障与落户政策。' }
        ];

        // 备用多个数据源，防止单个失效
        const GEO_SOURCES = [
            'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',
            'https://cdn.jsdelivr.net/gh/apache/echarts-website@asf-site/examples/data/asset/geo/china.json'
        ];

        async function init() {
            const chart = echarts.init(document.getElementById('china-map'));
            const status = document.getElementById('statusText');
            
            let geoData = null;
            // 循环尝试数据源
            for (let url of GEO_SOURCES) {
                try {
                    const res = await fetch(url);
                    if (res.ok) {
                        geoData = await res.json();
                        break; 
                    }
                } catch (e) { console.warn("尝试源失败:", url); }
            }

            if (!geoData) {
                status.innerHTML = "<b style='color:red'>数据请求被浏览器拦截</b><br>请尝试更换浏览器或检查网络";
                return;
            }

            echarts.registerMap('china', geoData);
            document.getElementById('loadingOverlay').style.display = 'none';

            chart.setOption({
                series: [{
                    type: 'map',
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    label: { show: true, fontSize: 12 },
                    itemStyle: { areaColor: '#f4f4f4', borderColor: '#999' },
                    emphasis: { itemStyle: { areaColor: '#fdecec' } },
                    select: { itemStyle: { areaColor: '#d6292b' }, label: { color: '#fff' } },
                    data: dataList
                }]
            });

            chart.on('click', (params) => {
                document.getElementById('selectedRegion').innerText = params.name;
                const item = dataList.find(d => d.name === params.name);
                document.getElementById('regionData').innerHTML = item ? 
                    `<b>政策：</b>${item.policy}<br><b>详情：</b>${item.info}` : 
                    "暂无该地区详细导向数据";
            });
        }

        init();
    })();
</script>
</body>
</html>
